spring.application.name=discovery-server
server.port=8761

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Hostname: Docker'da EUREKA_HOSTNAME degiskeni ile override edilebilir,
# yoksa fallback 'localhost' olur (lokalde calistirmak icin).
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Config server ile iliskili bir sey varsa opsiyonel yap
# (Genelde discovery server kendi config'ini fetch etmez)
spring.cloud.config.enabled=${CONFIG_ENABLED:false}
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}


# Actuator ve Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.health.probes.enabled=true
management.endpoint.health.probes.enabled=true

spring.cloud.compatibility-verifier.enabled=false